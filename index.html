<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro 🍅</title>
    <link rel="stylesheet" href="style.css" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>

    <div class="app">

      <div class="tabs">
        <button class="tab active" data-mode="foco">🍅 Foco</button>
        <button class="tab" data-mode="pausa-curta">🌿 Pausa Curta</button>
        <button class="tab" data-mode="pausa-longa">☁️ Pausa Longa</button>
      </div>

      <div class="scene">
        <svg class="scene-svg" viewBox="0 0 280 290" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="tomatoGrad" cx="40%" cy="35%" r="60%">
              <stop offset="0%" stop-color="#ff6b4a"/>
              <stop offset="60%" stop-color="#d63021"/>
              <stop offset="100%" stop-color="#9e1a0e"/>
            </radialGradient>
            <radialGradient id="leafGrad" cx="50%" cy="30%" r="70%">
              <stop offset="0%" stop-color="#6dcf3e"/>
              <stop offset="100%" stop-color="#2d7a1f"/>
            </radialGradient>
            <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(0,0,0,0.35)"/>
            </filter>
          </defs>

          <g transform="rotate(-90, 140, 155)">
            <circle class="ring-track" cx="140" cy="155" r="118"/>
            <circle class="ring-fill" id="ring" cx="140" cy="155" r="118"/>
          </g>

          <ellipse cx="140" cy="253" rx="72" ry="9" fill="rgba(0,0,0,0.18)"/>

          <path class="tomato-body" filter="url(#softShadow)" d="
            M 140,72 C 108,68 52,100 52,155
            C 52,205 90,248 140,248
            C 190,248 228,205 228,155
            C 228,100 172,68 140,72 Z
          "/>
          <path class="tomato-crease" d="M 85,215 Q 140,238 195,215 Q 168,232 140,233 Q 112,232 85,215 Z"/>
          <path d="M 140,80 Q 143,140 140,248" stroke="rgba(0,0,0,0.07)" stroke-width="3" fill="none"/>
          <path d="M 100,90 Q 95,145 105,240" stroke="rgba(0,0,0,0.05)" stroke-width="2" fill="none"/>
          <path d="M 180,90 Q 185,145 175,240" stroke="rgba(0,0,0,0.05)" stroke-width="2" fill="none"/>
          <ellipse class="tomato-shine" cx="104" cy="112" rx="26" ry="16" transform="rotate(-30, 104, 112)"/>

          <path class="stem" d="M 140,72 C 137,52 143,36 133,24" stroke-linecap="round"/>
          <path class="leaf" d="M 136,68 C 105,40 72,48 75,68 C 92,60 118,64 136,68 Z"/>
          <path class="leaf" d="M 144,68 C 175,40 208,48 205,68 C 188,60 162,64 144,68 Z"/>
          <path class="leaf leaf-mid" d="M 138,66 C 128,42 124,24 140,20 C 156,24 152,42 142,66 Z"/>
          <path class="leaf leaf-side-l" d="M 133,70 C 108,55 90,35 95,26 C 108,36 124,55 135,72 Z"/>
          <path class="leaf leaf-side-r" d="M 147,70 C 172,55 190,35 185,26 C 172,36 156,55 145,72 Z"/>
        </svg>

        <div class="timer-center">
          <div class="adjust-row" id="adjustRow">
            <button class="btn-adjust" id="minusBtn">−</button>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <button class="btn-adjust" id="plusBtn">+</button>
          </div>
        </div>
      </div>

      <p class="mode-label" id="modeLabel">hora de focar</p>

      <div class="controls">
        <button class="btn-start" id="startBtn">Iniciar</button>
        <button class="btn-reset" id="resetBtn">↺</button>
      </div>

      <div class="sessions">
        <span id="sessionCount">0</span> sessões hoje
      </div>

    </div>

    <script src="script.js"></script>
  </body>
</html>
